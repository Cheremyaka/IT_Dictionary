<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IT Dictionary - Поиск терминов</title>
    <style>
        :root {
            --primary-color: #2563eb;
            --secondary-color: #1e40af;
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --text-secondary: rgb(43, 35, 35, 0,10);
        }

        * {
            box-sizing: border-box;
        }
            
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            line-height: 1.6;
            min-height: 100vh;
        }

        header {
            background: rgba(255, 255, 255, 0.95);
            padding: 3rem 1rem;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        h1 {
            margin: 0;
            font-size: 2.5rem;
            color: var(--primary-color);
            background: linear-gradient(45deg, var(--primary-color), var(--secondary-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            margin-top: 15px;
            color: var(--text-secondary);
            font-size: 1.2rem;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 2rem 1rem;
        }

        .search-container {
            background: white;
            padding: 2rem;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            margin-bottom: 2rem;
            text-align: center;
        }

        .search-box {
            width: 100%;
            padding: 20px 25px;
            font-size: 1.2rem;
            border: 3px solid #e2e8f0;
            border-radius: 12px;
            transition: all 0.3s;
        }

        .search-box:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 5px rgba(37, 99, 235, 0.2);
        }

        .search-hint {
            margin-top: 15px;
            color: var(--text-secondary);
            font-size: 0.95rem;
        }

        .search-hint span {
            background: #e0e7ff;
            color: var(--primary-color);
            padding: 3px 10px;
            border-radius: 6px;
            margin: 0 5px;
            font-weight: 600;
        }

        /* Скрытый по умолчанию список */
        #dictionaryList {
            display: none;
        }

        #dictionaryList.visible {
            display: block;
            animation: fadeIn 0.4s ease-in;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .word-card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 1.5rem;
            margin-bottom: 1rem;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            border-left: 5px solid var(--primary-color);
            transition: all 0.3s;
        }

        .word-card:hover {
            transform: translateX(5px);
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.15);
        }

        .word-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #f1f5f9;
            padding-bottom: 12px;
            margin-bottom: 12px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .english-word {
            font-size: 1.6rem;
            font-weight: 700;
            color: var(--primary-color);
        }

        .russian-translation {
            font-size: 1.2rem;
            color: var(--text-secondary);
            font-style: italic;
            background: #f1f5f9;
            padding: 5px 15px;
            border-radius: 20px;
        }

        .word-definition {
            font-size: 1.05rem;
            color: #334155;
            line-height: 1.7;
        }

        .no-results {
            text-align: center;
            color: var(--text-secondary);
            font-size: 1.3rem;
            padding: 3rem;
            background: white;
            border-radius: 12px;
            display: none;
        }

        .results-count {
            text-align: center;
            color: var(--text-secondary);
            margin-bottom: 1rem;
            font-size: 1rem;
            display: none;
        }

        .results-count.visible {
            display: block;
        }

        footer {
            text-align: center;
            padding: 2rem;
            color: white;
            background: rgba(0, 0, 0, 0.2);
            margin-top: 3rem;
        }

        @media (max-width: 768px) {
            h1 { font-size: 1.8rem; }
            .word-header { flex-direction: column; align-items: flex-start; }
            .search-box { padding: 15px 20px; font-size: 1rem; }
        }
    </style>
</head>

        dictionaryData.sort((a, b) => a.word.localeCompare(b.word));

        function renderList(data) {
            const listContainer = document.getElementById('dictionaryList');
            const noResults = document.getElementById('noResults');
            const resultsCount = document.getElementById('resultsCount');
            const countNumber = document.getElementById('countNumber');
            
            listContainer.innerHTML = '';

            if (data.length === 0) {
                noResults.style.display = 'block';
                resultsCount.classList.remove('visible');
                listContainer.classList.remove('visible');
                return;
            }

            noResults.style.display = 'none';
            resultsCount.classList.add('visible');
            listContainer.classList.add('visible');
            countNumber.textContent = data.length;

            data.forEach(item => {
                const card = document.createElement('div');
                card.className = 'word-card';
                card.innerHTML = `
                    <div class="word-header">
                        <span class="english-word">${item.word}</span>
                        <span class="russian-translation">${item.translation}</span>
                    </div>
                    <div class="word-definition">${item.meaning}</div>
                `;
                listContainer.appendChild(card);
            });
        }

        function filterWords(query) {
            const lowerQuery = query.toLowerCase().trim();
            
            // Если поиск пустой - скрываем список
            if (lowerQuery === '') {
                document.getElementById('dictionaryList').classList.remove('visible');
                document.getElementById('resultsCount').classList.remove('visible');
                document.getElementById('noResults').style.display = 'none';
                return;
            }

            // ИЗМЕНЕНО: поиск только по term и translation, без meaning
            const filtered = dictionaryData.filter(item => 
                item.word.toLowerCase().includes(lowerQuery) || 
                item.translation.toLowerCase().includes(lowerQuery)
            );

            renderList(filtered);
        }

        document.addEventListener('DOMContentLoaded', () => {
            const searchInput = document.getElementById('searchInput');
            searchInput.addEventListener('input', (e) => filterWords(e.target.value));
            
            // Фокус на поле поиска при загрузке
            searchInput.focus();
        });
    </script>
